name: Export Jira Filter

on:
  workflow_dispatch:
    inputs:
      jira_url:
        description: 'Jira instance URL (e.g. https://yourorg.atlassian.net)'
        required: true
      jira_email:
        description: 'Jira user email address'
        required: true
      jira_api_token:
        description: 'Jira API token'
        required: true
      filter_id:
        description: 'Jira filter ID (numeric)'
        required: true
      include_subtasks:
        description: 'Include subtasks'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      subtasks_labels:
        description: 'Labels to filter subtasks (comma-separated, only used when include_subtasks is true)'
        required: false
        default: ''
      output:
        description: 'Output CSV filename (leave empty for auto-generated name)'
        required: false
        default: ''

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete previous workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo "${{ github.repository }}" --workflow=export.yml \
            --limit 100 --json databaseId --jq '.[].databaseId' \
            | grep -v "^${{ github.run_id }}$" \
            | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}" 2>/dev/null || true
        shell: bash

      - uses: actions/checkout@v4

      - id: export
        name: Export Jira filter to CSV
        uses: PunteriaCero/jira-xport@main
        with:
          filter_id: ${{ inputs.filter_id }}
          jira_url: ${{ inputs.jira_url }}
          jira_email: ${{ inputs.jira_email }}
          jira_api_token: ${{ inputs.jira_api_token }}
          output: ${{ inputs.output }}
          include_subtasks: ${{ inputs.include_subtasks }}
          subtasks_labels: ${{ inputs.subtasks_labels }}

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: jira-export-${{ inputs.filter_id }}
          path: ${{ steps.export.outputs.csv_path }}
          if-no-files-found: error
          retention-days: 1
