name: 'Jira Xport'
description: 'Export all tickets from a Jira filter to a CSV file using the filter configured columns.'
author: 'hlavrencic'
branding:
  icon: 'download'
  color: 'blue'

inputs:
  filter_id:
    description: 'Jira filter ID (numeric)'
    required: true
  jira_url:
    description: 'Jira instance URL (e.g. https://yourorg.atlassian.net)'
    required: true
  jira_email:
    description: 'Jira user email address'
    required: true
  jira_api_token:
    description: 'Jira API token'
    required: true
  output:
    description: 'Output CSV file path (relative to workspace). Defaults to jira_filter_<id>_<timestamp>.csv'
    required: false
    default: ''
  include_subtasks:
    description: 'Set to "true" to include subtasks of each issue'
    required: false
    default: 'false'
  subtasks_labels:
    description: 'Comma-separated list of labels to filter subtasks (only used when include_subtasks is "true"). Leave empty to include all subtasks.'
    required: false
    default: ''

outputs:
  csv_path:
    description: 'Path to the generated CSV file (relative to workspace)'
    value: ${{ steps.export.outputs.csv_path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Export Jira filter to CSV
      id: export
      shell: bash
      env:
        JIRA_URL: ${{ inputs.jira_url }}
        JIRA_EMAIL: ${{ inputs.jira_email }}
        JIRA_API_TOKEN: ${{ inputs.jira_api_token }}
        INPUT_FILTER_ID: ${{ inputs.filter_id }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_INCLUDE_SUBTASKS: ${{ inputs.include_subtasks }}
        INPUT_SUBTASKS_LABELS: ${{ inputs.subtasks_labels }}
      run: |
        ARGS="$INPUT_FILTER_ID"

        if [ -n "$INPUT_OUTPUT" ]; then
          ARGS="$ARGS -o $INPUT_OUTPUT"
        fi

        if [ "$INPUT_INCLUDE_SUBTASKS" = "true" ]; then
          if [ -n "$INPUT_SUBTASKS_LABELS" ]; then
            ARGS="$ARGS --subtasks $INPUT_SUBTASKS_LABELS"
          else
            ARGS="$ARGS --subtasks"
          fi
        fi

        python "${{ github.action_path }}/main.py" $ARGS

        # Resolve the actual output path (may be auto-generated)
        if [ -n "$INPUT_OUTPUT" ]; then
          echo "csv_path=$INPUT_OUTPUT" >> "$GITHUB_OUTPUT"
        else
          CSV=$(ls -t output/jira_filter_${INPUT_FILTER_ID}_*.csv 2>/dev/null | head -1 || true)
          echo "csv_path=${CSV}" >> "$GITHUB_OUTPUT"
        fi
